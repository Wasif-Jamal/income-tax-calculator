version: "3.9"

services:
  backend:
    build: .
    container_name: tax-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: tax-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    restart: always